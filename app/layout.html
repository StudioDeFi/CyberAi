<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberAi App</title>
    <style>
      /* Hybrid dark + neon cyan theme */
      :root {
        --bg: #02070a;
        --bg-panel: #050d13;
        --text: #e6faff;
        --text-dim: #8bbcc7;
        --border: #0a1f26;
        --accent: #00eaff;
        --accent-dark: #009bb3;
        --accent-glow: rgba(0, 234, 255, 0.45);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, sans-serif;
      }

      .app-shell {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* Activity Bar */
      .activity-bar {
        display: none;
        width: 56px;
        background: var(--bg-panel);
        border-right: 1px solid var(--border);
        flex-direction: column;
        align-items: center;
        padding: 1rem 0;
        gap: 0.5rem;
      }

      .activity-bar a {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: 8px;
        color: var(--text-dim);
        text-decoration: none;
        font-size: 1.2rem;
        transition: all 0.2s ease;
      }

      .activity-bar a:hover,
      .activity-bar a.active {
        color: var(--accent);
        background: rgba(0, 234, 255, 0.08);
        box-shadow: 0 0 8px var(--accent-glow);
      }

      /* IDE Layout */
      .ide-layout {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* Main content */
      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: auto;
        padding: 2rem;
      }

      /* Header */
      .app-header {
        background: var(--bg-panel);
        border-bottom: 1px solid var(--border);
        padding: 0.75rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .app-header .logo {
        font-size: 1.1rem;
        font-weight: 800;
        color: var(--accent);
        text-shadow: 0 0 8px var(--accent-glow);
        text-decoration: none;
      }

      /* Mobile nav */
      .mobile-nav {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .mobile-nav a {
        color: var(--text-dim);
        text-decoration: none;
        font-size: 0.9rem;
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        transition: all 0.2s ease;
      }

      .mobile-nav a:hover,
      .mobile-nav a.active {
        color: var(--accent);
        background: rgba(0, 234, 255, 0.08);
      }

      /* Chat panel */
      .chat-panel {
        background: var(--bg-panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        height: 500px;
        max-width: 720px;
        margin: 0 auto;
        width: 100%;
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .chat-bubble-user {
        align-self: flex-end;
        border: 1px solid var(--accent);
        background: var(--bg-panel);
        border-radius: 12px 12px 2px 12px;
        padding: 0.75rem 1rem;
        color: var(--text);
        max-width: 80%;
      }

      .chat-bubble-ai {
        align-self: flex-start;
        border: 1px solid var(--accent-dark);
        background: var(--bg-panel);
        border-radius: 12px 12px 12px 2px;
        padding: 0.75rem 1rem;
        color: var(--text);
        max-width: 80%;
        box-shadow: 0 0 12px var(--accent-glow);
      }

      .chat-input-row {
        padding: 0.75rem;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 0.5rem;
      }

      .chat-input-row input {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.5rem 0.75rem;
        color: var(--text);
        font-size: 0.95rem;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .chat-input-row input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 8px var(--accent-glow);
      }

      .chat-input-row button {
        background: var(--accent);
        color: var(--bg);
        border: none;
        border-radius: 6px;
        padding: 0.5rem 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .chat-input-row button:hover {
        background: var(--accent-dark);
        box-shadow: 0 0 8px var(--accent-glow);
      }

      @media (min-width: 769px) {
        .activity-bar {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <a href="/" class="logo">🔒 CyberAi</a>
        <nav class="mobile-nav">
          <a href="/app" class="active">App</a>
          <a href="/dashboard">Dashboard</a>
          <a href="/docs">Docs</a>
        </nav>
      </header>
      <div class="ide-layout">
        <aside class="activity-bar">
          <a href="/app" class="active" aria-label="Chat">💬</a>
          <a href="/dashboard" aria-label="Dashboard">📊</a>
          <a href="/docs" aria-label="Docs">📖</a>
          <a href="/operators" aria-label="Console">⚙️</a>
          <a href="/audit" aria-label="Audit">🔍</a>
        </aside>
        <main class="main-content">
          <div class="chat-panel">
            <div class="chat-messages" id="chat-messages">
              <div class="chat-bubble-ai">
                Hello! I'm CyberAi. How can I help you today?
              </div>
            </div>
            <div class="chat-input-row">
              <input
                type="text"
                id="chat-input"
                placeholder="Ask CyberAi..."
                autocomplete="off"
              />
              <button id="chat-send">Send</button>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script>
      const input = document.getElementById('chat-input');
      const send = document.getElementById('chat-send');
      const messages = document.getElementById('chat-messages');

      function addMessage(text, role) {
        const el = document.createElement('div');
        el.className = role === 'user' ? 'chat-bubble-user' : 'chat-bubble-ai';
        el.textContent = text;
        messages.appendChild(el);
        messages.scrollTop = messages.scrollHeight;
      }

      send.addEventListener('click', () => {
        const text = input.value.trim();
        if (!text) return;
        addMessage(text, 'user');
        input.value = '';
        setTimeout(() => addMessage('Processing your request…', 'ai'), 400);
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') send.click();
      });
    </script>
  </body>
</html>
