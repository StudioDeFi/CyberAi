apiVersion: apps/v1
kind: Deployment
metadata:
  name: god-swarm-runner
  namespace: cyberai-production
  labels:
    app: god-swarm-runner
    component: runner
    managed-by: god-swarm-ultra
spec:
  replicas: 5
  selector:
    matchLabels:
      app: god-swarm-runner
  template:
    metadata:
      labels:
        app: god-swarm-runner
        version: '1.0.0'
    spec:
      serviceAccountName: god-swarm-runner
      containers:
        - name: runner
          image: cyberai/god-swarm-runner:1.0.0
          env:
            - name: NODE_ENV
              value: production
            - name: CONTROL_PLANE_URL
              value: http://god-swarm-api.cyberai-production.svc.cluster.local
            - name: RUNNER_MAX_CONCURRENT_JOBS
              value: '5'
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
      terminationGracePeriodSeconds: 120
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: god-swarm-runner-hpa
  namespace: cyberai-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: god-swarm-runner
  minReplicas: 2
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: god-swarm-runner
  namespace: cyberai-production
