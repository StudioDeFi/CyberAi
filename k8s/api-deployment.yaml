apiVersion: apps/v1
kind: Deployment
metadata:
  name: god-swarm-api
  namespace: cyberai-production
  labels:
    app: god-swarm-api
    component: control-plane
    managed-by: god-swarm-ultra
spec:
  replicas: 3
  selector:
    matchLabels:
      app: god-swarm-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: god-swarm-api
        version: '1.0.0'
    spec:
      serviceAccountName: god-swarm-api
      containers:
        - name: api
          image: cyberai/god-swarm-api:1.0.0
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cyberai-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: cyberai-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cyberai-secrets
                  key: jwt-secret
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cyberai-secrets
                  key: openai-api-key
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: god-swarm-api
  namespace: cyberai-production
  labels:
    app: god-swarm-api
spec:
  selector:
    app: god-swarm-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: god-swarm-api
  namespace: cyberai-production
  labels:
    app: god-swarm-api
